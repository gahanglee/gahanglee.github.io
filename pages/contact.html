---
layout: default
title: 聯絡
permalink: /contact/
---
<div class="wrap">
  <section class="section" style="border-top:none;padding-top:7rem">
    <span class="section-tag">保持聯繫</span>
    <h2 class="section-title">聯絡我</h2>
    <p style="color:var(--text-muted);margin-bottom:2rem;font-size:0.95rem;line-height:1.85">無論是教材合作、教學資源分享，或是對 SEL 教育、心理輔導有任何想法，都歡迎聯絡。</p>

    <div class="contact-grid" style="margin-bottom:2.5rem">
      <div class="c-item"><div class="c-icon">📧</div><div><h4>Email</h4><p>gahanglee@gmail.com</p></div></div>
      <div class="c-item"><div class="c-icon">💼</div><div><h4>GitHub</h4><p><a href="https://github.com/gahanglee" target="_blank">gahanglee</a></p></div></div>
      <div class="c-item"><div class="c-icon">🏫</div><div><h4>服務單位</h4><p>臺南市學前巡迴輔導教師</p></div></div>
      <div class="c-item"><div class="c-icon">📍</div><div><h4>地區</h4><p>臺南市</p></div></div>
    </div>

    <!-- 聯絡表單 -->
    <div style="background:var(--teal-soft);border:1.5px solid rgba(107,155,138,0.3);border-radius:var(--radius);padding:2rem;margin-top:1rem">
      <h3 style="font-family:var(--serif);font-size:1.15rem;font-weight:700;margin-bottom:0.5rem">✉️ 傳訊息給我</h3>
      <p style="color:var(--text-muted);font-size:0.875rem;line-height:1.75;margin-bottom:1.5rem">填寫下方表單，我會盡快回覆你的訊息。</p>

      <form action="https://formspree.io/f/xdkonnag" method="POST" style="display:flex;flex-direction:column;gap:1rem">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem">
          <div>
            <label style="display:block;font-size:0.8rem;font-weight:600;color:var(--text-muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:0.06em">你的名字</label>
            <input type="text" name="name" required placeholder="王小明"
              style="width:100%;padding:0.7rem 1rem;border:1.5px solid var(--border);border-radius:var(--radius-sm);background:var(--bg);font-family:var(--sans);font-size:0.95rem;color:var(--text);outline:none">
          </div>
          <div>
            <label style="display:block;font-size:0.8rem;font-weight:600;color:var(--text-muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:0.06em">Email</label>
            <input type="email" name="email" required placeholder="email@example.com"
              style="width:100%;padding:0.7rem 1rem;border:1.5px solid var(--border);border-radius:var(--radius-sm);background:var(--bg);font-family:var(--sans);font-size:0.95rem;color:var(--text);outline:none">
          </div>
        </div>
        <div>
          <label style="display:block;font-size:0.8rem;font-weight:600;color:var(--text-muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:0.06em">訊息內容</label>
          <textarea name="message" required rows="5" placeholder="你好，我想..."
            style="width:100%;padding:0.7rem 1rem;border:1.5px solid var(--border);border-radius:var(--radius-sm);background:var(--bg);font-family:var(--sans);font-size:0.95rem;color:var(--text);outline:none;resize:vertical"></textarea>
        </div>
        <div>
          <button type="submit" class="btn btn-teal" style="width:100%;justify-content:center;padding:0.9rem">
            送出訊息 →
          </button>
        </div>
      </form>
    </div>

  </section>
</div>
