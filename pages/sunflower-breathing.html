<style>

  .breathing-sun-glow {
    position: absolute;
    top: 1.2rem;
    right: 3.4rem;
    width: 6rem;

    border-radius: 999px;
    background: #ffe27a;
    opacity: 0.55;

  .breathing-sun {
    position: absolute;
    top: 2rem;
    right: 4.15rem;

    place-items: center;

  @keyframes flowerBreath {

  @keyframes sunGlow {

  @media (max-width: 560px) {

<script>
  const steps = [
    {
      label: '吸氣',
      title: '聞一聞太陽花的香氣',
      sentence: '慢慢吸氣，把溫暖的光吸進心裡。',
      voice: '吸氣。聞一聞花香，慢慢吸進來。',
      duration: 6500
    },
    {
      label: '停一下',
      title: '讓小太陽亮在心裡',
      sentence: '停一下，感覺自己被溫柔的光抱住。',
      voice: '停一下。讓小太陽，亮在心裡。',
      duration: 3500
    },
    {
      label: '吐氣',
      title: '慢慢把氣吐出去',
      sentence: '慢慢吐氣，緊緊的感覺也跟著放鬆。',
      voice: '吐氣。慢慢吐出去，身體放鬆。',
      duration: 8000
    }
  ];

  const introText = '我們一起做太陽花呼吸。慢慢練習三個回合。';
  const finishText = '完成練習。做得很好，你完成了太陽花呼吸。';
  const label = document.getElementById('breath-label');
  const round = document.getElementById('round-text');
  const title = document.getElementById('guide-title');
  const sentence = document.getElementById('guide-sentence');
  const startButton = document.getElementById('start-button');
  const replayButton = document.getElementById('replay-button');
  const musicButton = document.getElementById('music-button');
  const pressButton = document.getElementById('press-button');
  const pressHint = document.getElementById('press-hint');
  const flowerHead = document.getElementById('flower-head');
  let timer = null;
  let currentIndex = 0;
  let practiceRun = 0;
  let manualReleaseTimer = null;
  let musicEnabled = true;
  let musicTimer = null;
  let audioContext = null;

  function getChineseVoice() {
    const synth = window.speechSynthesis;
    if (!synth) return null;
    return synth.getVoices().find(item => item.lang === 'zh-TW')
      || synth.getVoices().find(item => item.lang && item.lang.startsWith('zh'))
      || null;
  }

  function wait(ms) {
    return new Promise(resolve => {
      timer = window.setTimeout(resolve, ms);
    });
  }

  function playMusicTone(frequency, startAt, duration, volume = 0.035) {
    if (!audioContext) return;
    const osc = audioContext.createOscillator();
    const gain = audioContext.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(frequency, startAt);
    gain.gain.setValueAtTime(0.0001, startAt);
    gain.gain.exponentialRampToValueAtTime(volume, startAt + 0.12);
    gain.gain.exponentialRampToValueAtTime(0.0001, startAt + duration);
    osc.connect(gain);
    gain.connect(audioContext.destination);
    osc.start(startAt);
    osc.stop(startAt + duration + 0.08);
  }

  function playMusicPhrase() {
    if (!musicEnabled || !audioContext) return;
    const now = audioContext.currentTime;
    [523.25, 659.25, 783.99].forEach((frequency, index) => {
      playMusicTone(frequency, now + index * 0.42, 1.45, index === 1 ? 0.03 : 0.026);
    });
    playMusicTone(1046.5, now + 1.65, 1.9, 0.022);
  }

  function startMusic() {
    if (!musicEnabled || musicTimer) return;
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    if (!AudioContext) return;
    audioContext = audioContext || new AudioContext();
    audioContext.resume?.();
    playMusicPhrase();
    musicTimer = window.setInterval(playMusicPhrase, 9000);
  }

  function stopMusic() {
    window.clearInterval(musicTimer);
    musicTimer = null;
  }

  function updateMusicButton() {
    musicButton.textContent = `柔和音樂：${musicEnabled ? '開' : '關'}`;
  }

  function speakText(text, cancel = true) {
    const synth = window.speechSynthesis;
    return new Promise(resolve => {
      if (!synth || !window.SpeechSynthesisUtterance) {
        resolve();
        return;
      }
      if (cancel) synth.cancel();
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = 'zh-TW';
      utterance.rate = 0.48;
      utterance.pitch = 1.05;
      utterance.volume = 1;
      const voice = getChineseVoice();
      if (voice) utterance.voice = voice;
      utterance.onend = resolve;
      utterance.onerror = resolve;
      synth.speak(utterance);
    });
  }

  function setStep(index) {
    const step = steps[index % steps.length];
    label.textContent = step.label;
    title.textContent = step.title;
    sentence.textContent = step.sentence;
    round.textContent = `第 ${Math.min(3, Math.floor(index / steps.length) + 1)} 回合`;
  }

  function showFinish() {
    round.textContent = '完成練習';
    title.textContent = '我完成了太陽花呼吸';
    sentence.textContent = '做得很好，你已經把溫暖的光放進心裡了。';
    label.textContent = '完成';
  }

  function startManualInhale() {
    window.clearTimeout(manualReleaseTimer);
    flowerHead.classList.remove('manual-exhale');
    flowerHead.classList.add('manual-inhale');
    pressButton.classList.add('is-pressing');
    pressButton.textContent = '吸氣';
    label.textContent = '吸氣';
    pressHint.textContent = '按住，感覺花慢慢打開，空氣慢慢進來。';
  }

  function startManualExhale() {
    flowerHead.classList.remove('manual-inhale');
    flowerHead.classList.add('manual-exhale');
    pressButton.classList.remove('is-pressing');
    pressButton.textContent = '放開吐氣';
    label.textContent = '吐氣';
    pressHint.textContent = '放開，感覺花慢慢收回來，身體慢慢放鬆。';
    window.clearTimeout(manualReleaseTimer);
    manualReleaseTimer = window.setTimeout(() => {
      pressButton.textContent = '按住吸氣';
      pressHint.textContent = '按住時慢慢吸氣，放開時慢慢吐氣。';
    }, 3200);
  }

  async function startVoicedPractice(runId) {
    startMusic();
    await speakText(introText, false);
    if (runId !== practiceRun) return;
    await wait(900);
    if (runId !== practiceRun) return;

    while (currentIndex < 9 && runId === practiceRun) {
      const step = steps[currentIndex % steps.length];
      const startedAt = Date.now();
      setStep(currentIndex);
      await speakText(step.voice, false);
      if (runId !== practiceRun) return;
      const remaining = Math.max(900, step.duration - (Date.now() - startedAt));
      await wait(remaining);
      if (runId !== practiceRun) return;
      currentIndex += 1;
    }

    if (runId !== practiceRun) return;
    showFinish();
    await speakText(finishText, false);
    stopMusic();
  }

  function startSilentPractice(runId) {
    const scheduleNext = () => {
      const step = steps[currentIndex % steps.length];
      timer = window.setTimeout(() => {
        if (runId !== practiceRun) return;
        currentIndex += 1;
        if (currentIndex >= 9) {
          showFinish();
          return;
        }
        setStep(currentIndex);
        scheduleNext();
      }, step.duration);
    };

    scheduleNext();
  }

  function startPractice(withVoice) {
    practiceRun += 1;
    const runId = practiceRun;
    window.clearTimeout(timer);
    window.clearTimeout(manualReleaseTimer);
    window.speechSynthesis?.cancel();
    stopMusic();
    flowerHead.classList.remove('manual-inhale', 'manual-exhale');
    pressButton.classList.remove('is-pressing');
    pressButton.textContent = '按住吸氣';
    pressHint.textContent = '按住時慢慢吸氣，放開時慢慢吐氣。';
    currentIndex = 0;
    setStep(currentIndex);
    if (withVoice) {
      void startVoicedPractice(runId);
    } else {
      startSilentPractice(runId);
    }
  }

  startButton.addEventListener('click', () => startPractice(true));
  replayButton.addEventListener('click', () => startPractice(true));
  musicButton.addEventListener('click', () => {
    musicEnabled = !musicEnabled;
    updateMusicButton();
    if (!musicEnabled) stopMusic();
  });
  pressButton.addEventListener('pointerdown', event => {
    event.preventDefault();
    startManualInhale();
  });
  pressButton.addEventListener('pointerup', startManualExhale);
  pressButton.addEventListener('pointercancel', startManualExhale);
  pressButton.addEventListener('pointerleave', () => {
    if (pressButton.classList.contains('is-pressing')) startManualExhale();
  });
  pressButton.addEventListener('keydown', event => {
    if ((event.key === ' ' || event.key === 'Enter') && !pressButton.classList.contains('is-pressing')) {
      event.preventDefault();
      startManualInhale();
    }
  });
  pressButton.addEventListener('keyup', event => {
    if (event.key === ' ' || event.key === 'Enter') {
      event.preventDefault();
      startManualExhale();
    }
  });
  window.addEventListener('beforeunload', () => {
    practiceRun += 1;
    window.clearTimeout(timer);
    window.clearTimeout(manualReleaseTimer);
    window.speechSynthesis?.cancel();
    stopMusic();
  });
  updateMusicButton();
  startPractice(false);
</script>
