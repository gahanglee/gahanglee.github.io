<style>
  .breathing-page {
    position: relative;
    z-index: 1;
    min-height: 100vh;

    background: #fff8ec;
  }

  .breathing-shell {

    margin: 0 auto;
    text-align: center;
  }

  .breathing-title {
    font-family: var(--serif);

  .breathing-subtitle {

    max-width: 34rem;

  }

  .breathing-scene {
    position: relative;
    width: min(100%, 560px);

    margin: 1.75rem auto 1.25rem;
    overflow: hidden;
  }

  .breathing-sun-glow {
    position: absolute;
    top: 1.2rem;
    right: 3.4rem;
    width: 6rem;

    border-radius: 999px;
    background: #ffe27a;
    opacity: 0.55;

  .breathing-sun {
    position: absolute;
    top: 2rem;
    right: 4.15rem;
    width: 4.4rem;

    place-items: center;

  .flower-wrap {

    width: 15.5rem;

  .flower-head {

  .petal {

    margin-left: -1.125rem;
    margin-top: -2.45rem;
    background: #ffe06a;

  .flower-center {

    top: 50%;
    width: 5.1rem;
    height: 5.1rem;

    transform: translate(-50%, -50%);
    display: grid;
    place-items: center;

  .stem {

  .leaf {

  .leaf-left {
    left: 3.6rem;
    bottom: 3.7rem;
    border-radius: 3rem 0.4rem 3rem 0.4rem;

  .leaf-right {
    right: 3.4rem;
    bottom: 5.7rem;
    border-radius: 0.4rem 3rem 0.4rem 3rem;

  .breathing-child {
    position: absolute;
    left: 0.4rem;
    bottom: 1.75rem;
    width: 8.8rem;
    min-height: 7.5rem;
    border-radius: 1.35rem;
    display: grid;
    place-items: center;
    gap: 0.1rem;
    padding: 0.9rem;

    border: 1px solid #f4d6b8;

    width: min(100%, 620px);

  }

  .round-text {

    font-size: 0.95rem;
  }

  .guide-title {
    color: #0b3d34;
    font-size: clamp(1.45rem, 5vw, 2rem);
    line-height: 1.35;
    font-weight: 900;
    margin-top: 0.25rem;
  }

  .guide-sentence {
    color: #51463b;
    font-size: 1.12rem;
    line-height: 1.8;
    margin-top: 0.45rem;
  }

  .breathing-actions {
    display: flex;
    justify-content: center;
    gap: 0.85rem;
    flex-wrap: wrap;
    margin: 1.1rem 0 0;
  }

  .breathing-btn {
    border: none;
    border-radius: 999px;
    padding: 0.9rem 1.35rem;
    font-family: var(--sans);
    font-weight: 900;
    font-size: 1rem;
    cursor: pointer;
  }

  .breathing-btn-primary {
    background: #1d9e75;
    color: #fff;
  }

  .breathing-btn-secondary {
    background: #fff;
    color: #0f6e56;
    border: 1.5px solid #9adfc7;
  }

  .mantra-card {
    border: 1px solid #f4d6b8;
    background: #fffdf8;
    margin-top: 1rem;
  }

  .mantra-card h3 {
    color: #0f6e56;
    font-size: 1rem;
    font-weight: 900;
    margin-bottom: 0.45rem;
  }

  .mantra-card p {
    color: #333;
    font-size: 1.08rem;
    line-height: 1.8;
    margin: 0.25rem 0;
  }

  @keyframes flowerBreath {
    0%, 100% { transform: scale(0.9) rotate(-2deg); }
    36% { transform: scale(1.12) rotate(2deg); }
    56% { transform: scale(1.12) rotate(2deg); }
  }

  @keyframes sunGlow {
    0%, 100% { transform: scale(0.9); opacity: 0.35; }
    50% { transform: scale(1.14); opacity: 0.72; }
  }

  @keyframes childBreath {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.05); }
  }

  @media (max-width: 560px) {
    .breathing-page {
      padding-top: 6.25rem;
    }

    .breathing-scene {
      height: 410px;
      min-height: 410px;
    }

    .flower-wrap {
      bottom: 0.6rem;
      transform: translateX(-50%) scale(0.88);
    }

    .breathing-child {
      left: 50%;
      bottom: 0.35rem;
      transform: translateX(-50%);
      width: 9.3rem;
      min-height: 6.5rem;
    }

    .breathing-child {
      animation: childMobileBreath 18s ease-in-out infinite;
    }

    @keyframes childMobileBreath {
      0%, 100% { transform: translateX(-50%) scale(1); }
      50% { transform: translateX(-50%) scale(1.04); }
    }
  }
</style>

    <section class="breathing-scene" aria-label="太陽花呼吸動畫">
      <div class="breathing-sun-glow"></div>

<script>
  const steps = [
    {
      label: '吸氣',
      title: '聞一聞太陽花的香氣',
      sentence: '慢慢吸氣，把溫暖的光吸進心裡。',
      voice: '吸氣。聞一聞花香，慢慢吸進來。',
      duration: 6500
    },
    {
      label: '停一下',
      title: '讓小太陽亮在心裡',
      sentence: '停一下，感覺自己被溫柔的光抱住。',
      voice: '停一下。讓小太陽，亮在心裡。',
      duration: 3500
    },
    {
      label: '吐氣',
      title: '慢慢把氣吐出去',
      sentence: '慢慢吐氣，緊緊的感覺也跟著放鬆。',
      voice: '吐氣。慢慢吐出去，身體放鬆。',
      duration: 8000
    }
  ];

  const introText = '我們一起做太陽花呼吸。慢慢練習三個回合。';
  const finishText = '完成練習。做得很好，你慢慢回來了。';
  const label = document.getElementById('breath-label');
  const round = document.getElementById('round-text');
  const title = document.getElementById('guide-title');
  const sentence = document.getElementById('guide-sentence');
  const startButton = document.getElementById('start-button');
  const replayButton = document.getElementById('replay-button');
  let timer = null;
  let currentIndex = 0;
  let practiceRun = 0;

  function getChineseVoice() {
    const synth = window.speechSynthesis;
    if (!synth) return null;
    return synth.getVoices().find(item => item.lang === 'zh-TW')
      || synth.getVoices().find(item => item.lang && item.lang.startsWith('zh'))
      || null;
  }

  function wait(ms) {
    return new Promise(resolve => {
      timer = window.setTimeout(resolve, ms);
    });
  }

  function speakText(text, cancel = true) {
    const synth = window.speechSynthesis;
    return new Promise(resolve => {
      if (!synth || !window.SpeechSynthesisUtterance) {
        resolve();
        return;
      }
      if (cancel) synth.cancel();
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = 'zh-TW';
      utterance.rate = 0.48;
      utterance.pitch = 1.05;
      utterance.volume = 1;
      const voice = getChineseVoice();
      if (voice) utterance.voice = voice;
      utterance.onend = resolve;
      utterance.onerror = resolve;
      synth.speak(utterance);
    });
  }

  function setStep(index) {
    const step = steps[index % steps.length];
    label.textContent = step.label;
    title.textContent = step.title;
    sentence.textContent = step.sentence;
    round.textContent = `第 ${Math.min(3, Math.floor(index / steps.length) + 1)} 回合`;
  }

  function showFinish() {
    round.textContent = '完成練習';
    title.textContent = '我像太陽花一樣，慢慢回到安定';
    sentence.textContent = '做得很好，你已經把溫暖的光放進心裡了。';
    label.textContent = '完成';
  }

  async function startVoicedPractice(runId) {
    await speakText(introText, false);
    if (runId !== practiceRun) return;
    await wait(900);
    if (runId !== practiceRun) return;

    while (currentIndex < 9 && runId === practiceRun) {
      const step = steps[currentIndex % steps.length];
      const startedAt = Date.now();
      setStep(currentIndex);
      await speakText(step.voice, false);
      if (runId !== practiceRun) return;
      const remaining = Math.max(900, step.duration - (Date.now() - startedAt));
      await wait(remaining);
      if (runId !== practiceRun) return;
      currentIndex += 1;
    }

    if (runId !== practiceRun) return;
    showFinish();
    await speakText(finishText, false);
  }

  function startSilentPractice(runId) {
    const scheduleNext = () => {
      const step = steps[currentIndex % steps.length];
      timer = window.setTimeout(() => {
        if (runId !== practiceRun) return;
        currentIndex += 1;
        if (currentIndex >= 9) {
          showFinish();
          return;
        }
        setStep(currentIndex);
        scheduleNext();
      }, step.duration);
    };

    scheduleNext();
  }

  function startPractice(withVoice) {
    practiceRun += 1;
    const runId = practiceRun;
    window.clearTimeout(timer);
    window.speechSynthesis?.cancel();
    currentIndex = 0;
    setStep(currentIndex);
    if (withVoice) {
      void startVoicedPractice(runId);
    } else {
      startSilentPractice(runId);
    }
  }

  startButton.addEventListener('click', () => startPractice(true));
  replayButton.addEventListener('click', () => startPractice(true));
  window.addEventListener('beforeunload', () => {
    practiceRun += 1;
    window.clearTimeout(timer);
    window.speechSynthesis?.cancel();
  });
  startPractice(false);
</script>
