      <h1 class="detail-title">🌿 心理輔導</h1>
      <div class="detail-content">
        <p>心理輔導對我而言，是創造一個安全空間的過程——一個讓人可以放下防衛，真實面對自己的地方。我相信每個人都有自己的節奏和需要，陪伴而非指引，是我最核心的態度。</p>
<h3>多元接納</h3>
<p>我特別關注多元族群的心理需求，包括不同性別認同、性取向、文化背景的個體。接納不是容忍，而是真正地理解和尊重每個人的獨特性。</p>
<p>在教育現場，心理輔導的視角讓我更能理解孩子行為背後的情緒需求，也幫助我在與家長溝通時，帶入更多同理和支持。</p>
