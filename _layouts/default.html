<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} · {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{% if page.excerpt %}{{ page.excerpt | strip_html | truncate: 130 }}{% else %}{{ site.description }}{% endif %}">
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌿</text></svg>">
</head>
<body>

<div class="noise"></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>

{% include nav.html %}

<main>{{ content }}</main>

{% include footer.html %}

<script>
  // nav toggle
  const nav = document.querySelector('.nav');
  const toggle = document.querySelector('.nav-toggle');
  document.querySelectorAll('.nav-links a').forEach(l => {
    l.addEventListener('click', () => nav.classList.remove('open'));
  });
  toggle?.addEventListener('click', () => nav.classList.toggle('open'));

  // hide/show on scroll
  let last = 0;
  window.addEventListener('scroll', () => {
    const cur = window.scrollY;
    nav.style.transform = (cur > last && cur > 120) ? 'translateY(-100%)' : 'translateY(0)';
    last = cur;
  }, { passive: true });

  // active nav link
  const path = window.location.pathname;
  document.querySelectorAll('.nav-links a').forEach(a => {
    const href = a.getAttribute('href');
    if (href === path || (href !== '/' && path.startsWith(href))) {
      a.classList.add('active');
    }
  });
</script>
</body>
</html>
